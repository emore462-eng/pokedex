<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokédex ♡</title>
<link rel="icon" href="logo-pokemon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ef9fb4;
    --bg-deep: #e8879f;
    --card: #fdeef1;
    --pink: #d98a9b;
    --pink-deep: #b45f74;
    --pink-soft: #f6dde3;
    --ink: #4a3a3f;
    --muted: #9c8086;
    --gold: #c9a227;
    --gold-soft: #e6cf8f;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    padding: 44px 20px 70px;
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 10%, rgba(255,255,255,0.16), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(201,162,39,0.14), transparent 40%),
      linear-gradient(180deg, var(--bg), var(--bg-deep));
  }

  /* ---------- HEADER ---------- */
  .header {
    text-align: center;
    max-width: 520px;
    margin: 0 auto 34px;
  }
  .header-icon {
    font-size: 30px;
    margin-bottom: 6px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.12));
  }
  .title {
    margin: 0;
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: clamp(32px, 5vw, 46px);
    letter-spacing: 1px;
    color: #fff;
    text-shadow: 0 2px 10px rgba(180,95,116,0.4);
  }
  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 10px;
    color: var(--gold-soft);
  }
  .divider span {
    display: block;
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-soft));
  }
  .divider span:last-child { background: linear-gradient(to left, transparent, var(--gold-soft)); }

  /* ---------- SEARCH ---------- */
  .search-panel {
    max-width: 460px;
    margin: 0 auto 24px;
    display: flex;
    gap: 8px;
  }
  .search-input {
    flex: 1;
    padding: 12px 18px;
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 30px;
    color: var(--ink);
    font-family: 'Quicksand', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus {
    border-color: #fff;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.35);
  }
  .btn-scan {
    padding: 12px 24px;
    background: var(--pink-deep);
    color: #fff;
    border: none;
    border-radius: 30px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: background .15s, transform .15s;
  }
  .btn-scan:hover { background: #9c4c5f; transform: translateY(-1px); }

  /* ---------- LOADING ---------- */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin: 30px 0;
  }
  .heart-beat {
    font-size: 26px;
    animation: beat 1s ease-in-out infinite;
  }
  @keyframes beat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }
  .loading-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: #fff;
  }

  /* ---------- ERROR ---------- */
  .alert-panel {
    max-width: 420px;
    margin: 0 auto 20px;
    padding: 16px 20px;
    text-align: center;
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 14px;
  }
  .alert-prefix {
    margin: 0 0 4px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--pink-deep);
  }
  #mensaje-texto { margin: 0; font-size: 15px; color: var(--ink); }
  .btn-retry {
    margin-top: 10px;
    padding: 8px 18px;
    background: var(--pink-deep);
    border: none;
    color: #fff;
    border-radius: 20px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
  }
  .btn-retry:hover { background: #9c4c5f; }

  /* ---------- NO ENCONTRADO ---------- */
  .empty-panel {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px 20px;
    color: #fff;
    font-size: 16px;
  }
  .empty-panel .big { font-size: 28px; display: block; margin-bottom: 6px; }
  .empty-panel strong { color: #fff; text-decoration: underline; }

  /* ---------- GRID / TARJETAS ---------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(212px, 1fr));
    gap: 22px;
    max-width: 1040px;
    margin: 0 auto;
  }

  .card {
    position: relative;
    background: var(--card);
    border-radius: 4px;
    padding: 22px 16px 16px;
    text-align: center;
    box-shadow: 0 6px 18px rgba(180,95,116,0.18);
    transition: transform .18s, box-shadow .25s;
  }
  .card::before, .card::after {
    content: "";
    position: absolute;
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--gold);
    opacity: 0.8;
  }
  .card::before { top: 6px; left: 6px; border-right: none; border-bottom: none; }
  .card::after  { bottom: 6px; right: 6px; border-left: none; border-top: none; }
  .card:hover,
  .card:focus-within {
    transform: translateY(-5px);
    box-shadow: 0 0 0 1.5px var(--gold-soft), 0 0 28px 6px rgba(217,138,155,0.55);
  }

  /* sello con corazón, estilo profesora */
  .card-stamp {
    position: absolute;
    top: -12px;
    right: -8px;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px dashed var(--gold);
    border-radius: 50%;
    background: #fffdf5;
    color: var(--pink-deep);
    font-size: 18px;
    transform: rotate(-9deg);
  }

  .card-id {
    display: inline-block;
    margin-bottom: 6px;
    font-family: 'Quicksand', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--muted);
  }
  .card-img {
    width: 104px;
    height: 104px;
    object-fit: contain;
    margin: 4px auto 6px;
  }
  .card-name {
    margin: 2px 0 10px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 18px;
    text-transform: capitalize;
    color: var(--ink);
  }
  .badges {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .badge {
    font-family: 'Quicksand', sans-serif;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--gold-soft);
    color: var(--ink);
    background: var(--badge-color, var(--pink-soft));
  }

  .stats { text-align: left; margin: 10px 0 16px; }
  .stat-row {
    display: grid;
    grid-template-columns: 44px 1fr 26px;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    font-family: 'Quicksand', sans-serif;
    font-size: 10px;
  }
  .stat-label { color: var(--muted); font-weight: 700; letter-spacing: 0.5px; }
  .stat-bar-track {
    height: 5px;
    background: var(--pink-soft);
    border-radius: 6px;
    overflow: hidden;
  }
  .stat-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--pink), var(--gold));
    border-radius: 6px;
  }
  .stat-value { text-align: right; color: var(--ink); font-weight: 700; }

  .btn-capture {
    width: 100%;
    padding: 9px;
    margin-top: 4px;
    background: var(--pink-deep);
    border: none;
    color: #fff;
    border-radius: 20px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-capture:hover { background: #9c4c5f; }

  .btn-remove {
    width: 100%;
    margin-top: 8px;
    padding: 6px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-remove:hover { color: var(--pink-deep); }

  /* ---------- CARGAR MÁS ---------- */
  .load-more-wrap { text-align: center; margin: 38px 0 10px; }
  .btn-load {
    padding: 11px 28px;
    background: var(--card);
    border: 1.5px solid var(--gold);
    color: var(--pink-deep);
    border-radius: 30px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: background .15s;
  }
  .btn-load:hover { background: var(--pink-soft); }

  .hidden { display: none !important; }
</style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🎀</div>
    <h1 class="title">Pokédex</h1>
    <div class="divider"><span></span>✦<span></span></div>
  </div>

  <div class="search-panel">
    <input id="buscador" class="search-input" type="text" placeholder="Busca tu Pokémon favorito...">
    <button id="btn-buscar" class="btn-scan">Buscar</button>
  </div>

  <div id="spinner" class="hidden loading-wrap">
    <span class="heart-beat">💗</span>
    <span class="loading-label">buscando...</span>
  </div>

  <div id="mensaje" class="hidden alert-panel">
    <p class="alert-prefix">Un pequeño inconveniente</p>
    <p id="mensaje-texto"></p>
    <button id="btn-reintentar" class="hidden btn-retry">Intentar de nuevo</button>
  </div>

  <div id="resultado" class="grid"></div>

  <div class="load-more-wrap">
    <button id="cargar-mas" class="btn-load">Ver más Pokémon</button>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
